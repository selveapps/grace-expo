<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width: 100%; padding: 12px 14px 30px; display: flex; justify-content: space-around; align-items: flex-start; background: {{ barBg }}; border-top: 1px solid {{ barBorder }}; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
  <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1;">
      <div style="width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;" dangerouslySetInnerHTML="{{ t.svg }}"></div>
      <span style="font-family: 'Hanken Grotesk', sans-serif; font-size: 11px; font-weight: {{ t.weight }}; color: {{ t.color }}; letter-spacing: 0.2px;">{{ t.label }}</span>
    </div>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 402, &quot;height&quot;: 88 },
  &quot;active&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;today&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;today&quot;, &quot;stories&quot;, &quot;reading&quot;, &quot;you&quot;] },
  &quot;dark&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active ?? 'today';
    const dark = this.props.dark ?? false;
    const accent = '#b58a3f';
    const idle = dark ? 'rgba(240,235,225,0.55)' : '#b3a690';
    const paths = {
      today: '<path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" /><circle cx="12" cy="12" r="4" />',
      stories: '<path d="M7 13a4 4 0 0 1 0-2M17 11a4 4 0 0 1 0 2" /><path d="M5 12a7 7 0 0 1 14 0" /><rect x="3.5" y="11" width="3" height="6" rx="1.5" /><rect x="17.5" y="11" width="3" height="6" rx="1.5" />',
      reading: '<path d="M12 6c-1.6-1.2-4-1.6-6.5-1.4A1 1 0 0 0 4.5 5.6v11.2a1 1 0 0 0 1.1 1c2.3-.2 4.7.2 6.4 1.2 1.7-1 4.1-1.4 6.4-1.2a1 1 0 0 0 1.1-1V5.6a1 1 0 0 0-1-1C16.4 4.4 13.6 4.8 12 6zM12 6v13" />',
      you: '<path d="M12 4c3 3 3.5 7 1 11-2.5-4-2-8-1-11zM12 15c-3 0-5 2-5 5M12 15c3 0 5 2 5 5" />',
    };
    const defs = [
      { key: 'today', label: 'Today' },
      { key: 'stories', label: 'Stories' },
      { key: 'reading', label: 'Reading' },
      { key: 'you', label: 'You' },
    ];
    return {
      barBg: dark ? 'rgba(43,39,64,0.72)' : 'rgba(247,243,236,0.82)',
      barBorder: dark ? 'rgba(255,255,255,0.1)' : '#e7ddcd',
      tabs: defs.map(d => {
        const on = d.key === active;
        const stroke = on ? accent : idle;
        return {
          label: d.label,
          color: stroke,
          weight: on ? 700 : 500,
          svg: { __html: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="${on ? 2 : 1.7}" stroke-linecap="round" stroke-linejoin="round">${paths[d.key]}</svg>` },
        };
      }),
    };
  }
}
</script>
</body>
</html>
