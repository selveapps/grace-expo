<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width: 402px; font-family: 'Hanken Grotesk', sans-serif; background: #fffdf9; border: 1px solid #ece3d4; border-radius: 22px; padding: 22px 24px 24px; box-shadow: 0 10px 26px rgba(120,100,70,0.07);">
  <div style="display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px;">
    <span style="font-family: 'Hanken Grotesk'; font-size: 12px; font-weight: 700; letter-spacing: 1px; color: #b58a3f;">{{ n }}</span>
    <span style="font-family: 'Cormorant Garamond', serif; font-size: 27px; font-weight: 600; color: #3a2c22; line-height: 1;">{{ title }}</span>
  </div>
  <div style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; color: #6b5d4e; line-height: 1.35; margin: 10px 0 18px; white-space: pre-line;">{{ copy }}</div>
  <div style="display: flex; flex-direction: column; gap: 12px;">
    <sc-for list="{{ rows }}" as="r" hint-placeholder-count="4">
      <div style="display: flex; gap: 12px; align-items: flex-start;">
        <span style="flex-shrink: 0; width: 80px; font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: {{ r.tint }}; padding-top: 2px;">{{ r.label }}</span>
        <span style="flex: 1; font-size: 13.5px; line-height: 1.45; color: #4a3d30;">{{ r.text }}</span>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 402, &quot;height&quot;: 300 },
  &quot;n&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;01&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;title&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Screen&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;copy&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;grace&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;interaction&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;haptic&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;motion&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const rows = [
      { label: 'Grace', text: p.grace, tint: '#b58a3f' },
      { label: 'Interaction', text: p.interaction, tint: '#8a7c68' },
      { label: 'Haptic', text: p.haptic, tint: '#c58a52' },
      { label: 'Motion', text: p.motion, tint: '#8a7c68' },
    ].filter(r => r.text);
    return {
      n: p.n ?? '',
      title: p.title ?? '',
      copy: p.copy ?? '',
      rows,
    };
  }
}
</script>
</body>
</html>
